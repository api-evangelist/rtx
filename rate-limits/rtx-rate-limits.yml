specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: RTX
providerId: rtx
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Defense
  - Aerospace
  - Government
  - Rate Limiting
description: >-
  RTX does not publish public API rate limits. Throttling and SLAs for EAGLE and BBN
  software are defined per program contract under defense and government terms.
notes: >-
  No public rate-limit documentation exists. Reconcile against the specific program
  contract.
sources:
  - https://www.rtx.com/
responseCodes:
  throttled: 429
limits:
  - name: Program-contract throttling
    scope: program
    metric: varies
    limit: see program contract
    notes: >-
      Concurrency and throughput are governed by the executed government or defense program
      contract, not by a published public quota.
policies:
  - name: Program Contract Governance
    description: >-
      Rate, retry, and SLA behavior follow the executed program contract and applicable
      ITAR/EAR controls.
