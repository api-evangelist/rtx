  name: RTX EAGLE API
  description: The RTX EAGLE (Enhanced Automated Graphical Logistics Environment) API provides integration capabilities for
    the EAGLE logistics support analysis platform developed by Raytheon. EAGLE manages product support throughout a defense
    system's entire lifespan, enabling users to build and maintain logistics data, create reports, and support fielded systems
    through operations and maintenance. The API supports integration with intelligence analysis, data management, and analytics
    workflows used in defense and government environments.
