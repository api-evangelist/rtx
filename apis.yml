aid: rtx
name: RTX
description: 'RTX Corporation is a leading American aerospace and defense company comprising three market businesses: Collins
  Aerospace, Pratt & Whitney, and Raytheon. Raytheon develops the EAGLE (Enhanced Automated Graphical Logistics Environment)
  software platform for integrated logistics support and logistic support analysis across defense programs. RTX BBN Technologies
  (a Raytheon subsidiary) develops open-source software including SPARQL triple stores, NLP frameworks, and TAK ecosystem
  plugins for government and military situational awareness platforms.'
