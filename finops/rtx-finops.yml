description: >-
  RTX defense and aerospace software is sold under government program contracts. FinOps
  treatment is program-cost driven, not usage-metered.
notes: >-
  No public usage API or itemized billing exists. Cost is dominated by program-of-record
  contracts and FFP / cost-plus structures rather than pay-as-you-go meters.
sources:
  - https://www.rtx.com/
billingModel:
  pricingCategory: Government Program Contract
  billingFrequency: Per Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: RTX Defense Software
  ServiceCategory: Defense / Aerospace Software
  ProviderName: RTX
  PublisherName: RTX Corporation
  BillingCurrency: USD
meters:
  - name: program_cost
    description: Program-contract obligation lines (FFP, cost-plus, T&M)
    unit: contract_line
    aggregation: sum
    dimensions:
      - program
      - contract_type
principles:
  - name: Visibility
    description: >-
      Track RTX program cost through DFARS-compliant cost-accounting reports and the prime
      contractor's program-management dashboards.
  - name: Allocation
    description: >-
      Allocate RTX program cost to the contract WBS and the consuming program-of-record, not
      to general IT.
  - name: Optimization
    description: >-
      Optimization levers are program-management driven (scope control, EVM, sub-contract
      management) rather than infrastructure auto-scaling.
  - name: Accountability
    description: >-
      Program managers and contracting officers own RTX-related cost; review through standard
      EVM and milestone reviews.
maintainers:
