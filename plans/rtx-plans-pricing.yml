description: >-
  RTX (Raytheon, Pratt & Whitney, Collins Aerospace) and its subsidiaries (BBN Technologies)
  do not operate a public commercial API portal. Software such as the EAGLE logistics
  platform, BBN open-source projects, and TAK ecosystem components is distributed under
  government program contracts, defense partnerships, or open-source licenses.
notes: >-
  RTX programs are gated to defense and government customers under FAR/DFARS and ITAR/EAR
  controls. No public API pricing is published. Trimmed to a single contact-sales
  placeholder.
sources:
  - https://www.rtx.com/
plans:
  - id: rtx-contact-sales
    name: Contact Sales
    type: enterprise
    description: >-
      RTX defense software (EAGLE, BBN tools, TAK plugins) is licensed under government and
      defense program contracts. Engage RTX or the relevant prime contractor for terms.
    entries:
      - label: Government program contract
        name: program_contract
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Government Program Contract
      - name: ITAR / EAR Compliance
      - name: Approved Defense Partner
