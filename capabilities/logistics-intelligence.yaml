naftiko: 1.0.0-alpha2
info:
  label: RTX Logistics Intelligence
  description: Workflow capability for defense logistics intelligence using the RTX EAGLE platform. Combines data source management,
    analytics job monitoring, and report generation for logistics support analysis (LSA) workflows. Serves logistics engineers,
    program managers, and defense operations teams managing the lifecycle of complex defense systems.
  tags:
  - Defense
  - Logistics
  - Intelligence
  - Analytics
  - RTX
  - Raytheon
  - Government
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    RTX_EAGLE_API_TOKEN: RTX_EAGLE_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: eagle-api
    baseUri: https://api.rtx.com/eagle
    description: RTX EAGLE logistics support analysis API
    authentication:
      type: bearer
      token: '{{RTX_EAGLE_API_TOKEN}}'
    resources:
    - name: data-sources
      path: /data-sources
      description: Manage and query intelligence data sources
      operations:
      - name: list-data-sources
        method: GET
        description: List configured data sources available for intelligence analysis
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: analytics
      path: /analytics
      description: Run analytics jobs and retrieve analysis results
      operations:
      - name: list-analytics-jobs
        method: GET
        description: List analytics jobs and their statuses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: reports
      path: /reports
      description: Generate and retrieve intelligence reports
      operations:
      - name: list-reports
        method: GET
        description: List generated intelligence reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: logistics-intelligence-api
    description: Unified REST API for RTX EAGLE logistics intelligence workflows.
    resources:
    - path: /v1/data-sources
      name: data-sources
      description: Intelligence and logistics data sources
      operations:
      - method: GET
        name: list-data-sources
        description: List all configured intelligence data sources
        call: eagle-api.list-data-sources
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analytics
      name: analytics
      description: Analytics jobs for logistics data
      operations:
      - method: GET
        name: list-analytics
        description: List analytics jobs and statuses
        call: eagle-api.list-analytics-jobs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reports
      name: reports
      description: Intelligence and logistics reports
      operations:
      - method: GET
        name: list-reports
        description: List generated intelligence reports
        call: eagle-api.list-reports
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: logistics-intelligence-mcp
    transport: http
    description: MCP server for AI-assisted RTX EAGLE logistics intelligence workflows.
    tools:
    - name: list-data-sources
      description: List all intelligence and logistics data sources configured in the RTX EAGLE platform
      hints:
        readOnly: true
        openWorld: false
      call: eagle-api.list-data-sources
      outputParameters:
      - type: object
        mapping: $.
    - name: list-analytics-jobs
      description: List all analytics jobs and their current status in RTX EAGLE
      hints:
        readOnly: true
        openWorld: false
      call: eagle-api.list-analytics-jobs
      outputParameters:
      - type: object
        mapping: $.
    - name: list-reports
      description: List generated intelligence and logistics reports available for review
      hints:
        readOnly: true
        openWorld: false
      call: eagle-api.list-reports
      outputParameters:
      - type: object
        mapping: $.
