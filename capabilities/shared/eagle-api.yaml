naftiko: "1.0.0-alpha1"

info:
  label: "RTX EAGLE API"
  description: >-
    Shared capability definition for the RTX EAGLE logistics support analysis
    platform API. Provides access to data sources, analytics jobs, and
    intelligence reports for defense program logistics management.
  tags:
    - Defense
    - Logistics
    - Intelligence
    - Analytics
    - RTX
    - Raytheon
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RTX_EAGLE_API_TOKEN: RTX_EAGLE_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: eagle-api
      baseUri: https://api.rtx.com/eagle
      description: "RTX EAGLE logistics support analysis API"
      authentication:
        type: bearer
        token: "{{RTX_EAGLE_API_TOKEN}}"
      resources:
        - name: data-sources
          path: /data-sources
          description: Manage and query intelligence data sources
          operations:
            - name: list-data-sources
              method: GET
              description: "List configured data sources available for intelligence analysis"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: analytics
          path: /analytics
          description: Run analytics jobs and retrieve analysis results
          operations:
            - name: list-analytics-jobs
              method: GET
              description: "List analytics jobs and their statuses"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: reports
          path: /reports
          description: Generate and retrieve intelligence reports
          operations:
            - name: list-reports
              method: GET
              description: "List generated intelligence reports"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: eagle-api-rest
      resources:
        - path: /v1/data-sources
          name: data-sources
          description: "Intelligence data sources"
          operations:
            - method: GET
              name: list-data-sources
              description: "List available data sources"
              call: "eagle-api.list-data-sources"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/analytics
          name: analytics
          description: "Analytics jobs"
          operations:
            - method: GET
              name: list-analytics-jobs
              description: "List analytics jobs"
              call: "eagle-api.list-analytics-jobs"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports
          name: reports
          description: "Intelligence reports"
          operations:
            - method: GET
              name: list-reports
              description: "List intelligence reports"
              call: "eagle-api.list-reports"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: eagle-api-mcp
      transport: http
      tools:
        - name: list-data-sources
          description: "List configured intelligence data sources in the RTX EAGLE platform"
          hints:
            readOnly: true
            openWorld: false
          call: "eagle-api.list-data-sources"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-analytics-jobs
          description: "List analytics jobs and their statuses in EAGLE"
          hints:
            readOnly: true
            openWorld: false
          call: "eagle-api.list-analytics-jobs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-reports
          description: "List generated intelligence reports available in EAGLE"
          hints:
            readOnly: true
            openWorld: false
          call: "eagle-api.list-reports"
          outputParameters:
            - type: object
              mapping: "$."
